<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الظوبراني لمستحضرات التجميل</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Tahoma, Arial, sans-serif;
    background:linear-gradient(-45deg,#ff6ec7,#8e44ad,#3498db,#00c9a7);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

h1{
    font-size:65px;
    color:#fff;
    text-align:center;
    text-shadow:
        0 0 10px rgba(255,255,255,.8),
        0 0 25px rgba(255,255,255,.5),
        0 0 45px rgba(255,255,255,.3);
    animation:pop 1.5s ease, glow 2s infinite alternate;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

@keyframes pop{
    0%{
        transform:scale(.3) rotate(-8deg);
        opacity:0;
    }
    100%{
        transform:scale(1) rotate(0);
        opacity:1;
    }
}

@keyframes glow{
    from{
        text-shadow:
        0 0 15px #fff,
        0 0 30px #ff8ad8,
        0 0 45px #ff4fb3;
    }

    to{
        text-shadow:
        0 0 25px #fff,
        0 0 50px #ffd4ef,
        0 0 70px #ffffff;
    }
}

.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,.12);
    animation:float 10s linear infinite;
}

.circle:nth-child(1){
    width:120px;
    height:120px;
    left:8%;
    top:80%;
}

.circle:nth-child(2){
    width:180px;
    height:180px;
    right:10%;
    top:15%;
    animation-duration:14s;
}

.circle:nth-child(3){
    width:80px;
    height:80px;
    left:70%;
    bottom:5%;
    animation-duration:8s;
}

@keyframes float{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-900px) rotate(360deg);
    }
}
</style>

</head>

<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<h1>✨ الظوبراني لمستحضرات التجميل ✨</h1>

</body>
</html>
